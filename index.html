<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBill - Universal Invoice Generator</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- PDF Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        
        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Input Focus Styles */
        .input-focus:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15); transition: all 0.2s; }

        /* Print Styles */
        @media print {
            .no-print { display: none !important; }
            .print-container { 
                display: block !important; 
                width: 100% !important; 
                margin: 0 !important; 
                padding: 0 !important; 
                background: white !important;
                box-shadow: none !important;
                border: none !important;
                position: static !important;
                top: auto !important;
            }
            body { background: white; }
            @page { margin: 10mm; size: A4; }
        }
    </style>
</head>
<body class="text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useCallback, useRef } = React;

        // ─────────── UTILITY: Number to Words (Indian Format) ────────────
        const numberToWords = (num) => {
            if (num === 0) return 'Zero';
            if (num < 0) return `Minus ${numberToWords(-num)}`;
            
            const ones = ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine', 'Ten', 'Eleven', 'Twelve', 'Thirteen', 'Fourteen', 'Fifteen', 'Sixteen', 'Seventeen', 'Eighteen', 'Nineteen'];
            const tens = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
            
            const convert = (n) => {
                if (n < 20) return ones[n];
                if (n < 100) return tens[Math.floor(n / 10)] + (n % 10 ? ' ' + ones[n % 10] : '');
                if (n < 1000) return ones[Math.floor(n / 100)] + ' Hundred' + (n % 100 ? ' and ' + convert(n % 100) : '');
                if (n < 100000) return convert(Math.floor(n / 1000)) + ' Thousand' + (n % 1000 ? ' ' + convert(n % 1000) : '');
                if (n < 10000000) return convert(Math.floor(n / 100000)) + ' Lakh' + (n % 100000 ? ' ' + convert(n % 100000) : '');
                return convert(Math.floor(n / 10000000)) + ' Crore' + (n % 10000000 ? ' ' + convert(n % 10000000) : '');
            };
            
            return ` ${convert(num)} Rupees Only`;
        };

        // ──────────── PDF GENERATION LOGIC ────────────
        const generatePDF = async (elementId, fileName) => {
            const element = document.getElementById(elementId);
            if (!element) throw new Error('Invoice element not found');

            try {
                // Attempt Screenshot Method
                const canvas = await html2canvas(element, {
                    scale: 2, // High res
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: '#ffffff',
                    foreignObjectRendering: false, // Helps with some browser issues
                    logging: false,
                    scrollX: 0,
                    scrollY: -window.scrollY
                });

                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                
                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();
                const margin = 10;
                
                const imgWidth = canvas.width;
                const imgHeight = canvas.height;
                const ratio = Math.min((pageWidth - margin * 2) / imgWidth, (pageHeight - margin * 2) / imgHeight);
                
                const finalWidth = imgWidth * ratio;
                const finalHeight = imgHeight * ratio;
                const x = (pageWidth - finalWidth) / 2;
                const y = margin;

                pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', x, y, finalWidth, finalHeight);
                pdf.save(fileName);
                return true; // Success
            } catch (err) {
                console.warn("Screenshot PDF failed (likely due to file:// protocol), falling back to Print...", err);
                throw err; // Throw to trigger fallback
            }
        };

        // ──────────── CSV IMPORT / EXPORT ────────────
        const parseCSV = (text) => {
            const rows = [];
            let inQuotes = false;
            let currentField = '';
            let currentRow = [];
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];
                
                if (char === '"' && inQuotes && nextChar === '"') {
                    currentField += '"';
                    i++;
                } else if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentField);
                    currentField = '';
                } else if ((char === '\n' || (char === '\r' && nextChar === '\n')) && !inQuotes) {
                    if (char === '\r') i++;
                    currentRow.push(currentField);
                    rows.push(currentRow);
                    currentRow = [];
                    currentField = '';
                } else {
                    currentField += char;
                }
            }
            if (currentField !== '' || currentRow.length > 0) {
                currentRow.push(currentField);
                rows.push(currentRow);
            }
            return rows;
        };

        const exportToCSV = (items) => {
            if (items.length === 0) return alert('No items to export');
            const headers = ['Item Name', 'HSN', 'Qty', 'Unit', 'Rate', 'GST%'];
            const rows = items.map(i => [i.name, i.hsn || '', i.qty, i.unit, i.rate, i.gst]);
            const csvContent = [headers, ...rows].map(e => e.map(v => `"${String(v).replace(/"/g, '""')}"`).join(",")).join("\n");
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `invoice_items_${Date.now()}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // ──────────── UI COMPONENTS ────────────
        const SectionCard = ({ title, icon, children }) => (
            <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-5 mb-5">
                <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                    <span className="text-lg">{icon}</span> {title}
                </h3>
                {children}
            </div>
        );

        const Input = ({ label, ...props }) => (
            <div className="mb-3">
                <label className="block text-xs font-semibold text-gray-600 mb-1.5">{label}</label>
                <input {...props} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm transition-all input-focus" />
            </div>
        );

        const Select = ({ label, options, ...props }) => (
            <div className="mb-3">
                <label className="block text-xs font-semibold text-gray-600 mb-1.5">{label}</label>
                <select {...props} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm transition-all input-focus">
                    {options.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                </select>
            </div>
        );

        // ──────────── LEFT PANEL: INPUTS ────────────
        const FormPanel = ({ formData, setFormData, itemForm, setItemForm, items, setItems, onDownload, onReset, onImportCSV, onExportCSV, onWhatsApp, catalog, setCatalog }) => {
            const addItem = () => {
                if (!itemForm.name.trim() || !itemForm.rate || itemForm.qty <= 0) return alert('Please fill Item Name, Qty & Rate');
                const taxable = itemForm.qty * itemForm.rate;
                const gstAmt = taxable * (itemForm.gst / 100);
                setItems([...items, { id: Date.now(), ...itemForm, taxable, gstAmt, total: taxable + gstAmt }]);
                
                // Save to Catalog
                const exists = catalog.find(c => c.name.toLowerCase() === itemForm.name.trim().toLowerCase());
                if (!exists) {
                    const newCat = [...catalog, { name: itemForm.name.trim(), hsn: itemForm.hsn, unit: itemForm.unit, rate: itemForm.rate, gst: itemForm.gst }];
                    setCatalog(newCat);
                    localStorage.setItem('omnibill_catalog', JSON.stringify(newCat));
                }
                
                setItemForm({ name: '', hsn: '', qty: 1, unit: 'Pcs', rate: '', gst: 5 });
                const nameInput = document.getElementById('item-name-input');
                if (nameInput) nameInput.focus();
            };

            const handleItemNameChange = (e) => {
                const val = e.target.value;
                const match = catalog.find(c => c.name.toLowerCase() === val.toLowerCase());
                if (match) {
                    setItemForm({ ...itemForm, name: val, hsn: match.hsn, unit: match.unit, rate: match.rate, gst: match.gst, qty: 1 });
                } else {
                    setItemForm({ ...itemForm, name: val });
                }
            };

            const handleBarcodeScan = (e) => {
                if (e.key === 'Enter' && itemForm.name.trim()) {
                    e.preventDefault();
                    addItem();
                }
            };

            const removeItem = (id) => setItems(items.filter(i => i.id !== id));
            const updateStore = (f, v) => setFormData(prev => ({ ...prev, store: { ...prev.store, [f]: v } }));
            const updateCust = (f, v) => setFormData(prev => ({ ...prev, customer: { ...prev.customer, [f]: v } }));
            const updateInv = (f, v) => setFormData(prev => ({ ...prev, invoice: { ...prev.invoice, [f]: v } }));

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => updateStore('logo', reader.result);
                    reader.readAsDataURL(file);
                }
            };

            return (
                <div className="space-y-0">
                    {/* Store Section */}
                    <SectionCard title="Brand & Identity" icon="🎨">
                        <div className="grid grid-cols-2 gap-3 mb-3">
                            <div>
                                <label className="block text-xs font-semibold text-gray-600 mb-1">Brand Color</label>
                                <input type="color" value={formData.store.brandColor} onChange={e => updateStore('brandColor', e.target.value)} className="w-full h-10 p-1 bg-white border border-gray-200 rounded-lg cursor-pointer" />
                            </div>
                            <Select label="Invoice Tone" value={formData.invoice.template} onChange={e => updateInv('template', e.target.value)} options={[
                                { value: 'Standard', label: 'Enterprise Sharp' }, { value: 'Modern', label: 'Modern Pulse' }, { value: 'Customer', label: 'Warm Relationship' }, { value: 'Minimal', label: 'Pure Minimalist' }, { value: 'Thermal', label: 'Thermal POS' }
                            ]} />
                        </div>
                        <div className="mb-3 p-3 bg-gray-50 border border-gray-200 rounded-lg flex items-center gap-3">
                            <div className="flex-1">
                                <label className="block text-xs font-semibold text-gray-600 mb-1">Store Logo</label>
                                <input type="file" accept="image/*" onChange={handleLogoUpload} className="block w-full text-xs text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer" />
                            </div>
                            {formData.store.logo && <button onClick={() => updateStore('logo', '')} className="text-xs text-red-500 hover:text-red-700 font-bold px-2">Remove</button>}
                        </div>
                        <div className="mb-3 p-3 bg-gray-50 border border-gray-200 rounded-lg">
                            <div className="flex items-center justify-between mb-2">
                                <label className="text-xs font-semibold text-gray-600">E-Signature</label>
                                <div className="flex bg-white border border-gray-200 rounded-md p-0.5">
                                    <button onClick={() => updateStore('signatureType', 'image')} className={`px-2 py-0.5 text-[10px] rounded ${formData.store.signatureType === 'image' ? 'bg-emerald-600 text-white' : 'text-gray-500'}`}>Image</button>
                                    <button onClick={() => updateStore('signatureType', 'text')} className={`px-2 py-0.5 text-[10px] rounded ${formData.store.signatureType === 'text' ? 'bg-emerald-600 text-white' : 'text-gray-500'}`}>Type</button>
                                </div>
                            </div>
                            {formData.store.signatureType === 'image' ? (
                                <div className="flex items-center gap-3">
                                    <input type="file" accept="image/*" onChange={(e) => {
                                        const file = e.target.files[0];
                                        if (file) {
                                            const reader = new FileReader();
                                            reader.onloadend = () => updateStore('signature', reader.result);
                                            reader.readAsDataURL(file);
                                        }
                                    }} className="flex-1 text-[10px] text-gray-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:bg-emerald-50 file:text-emerald-700" />
                                    {formData.store.signature && <button onClick={() => updateStore('signature', '')} className="text-[10px] text-red-500 font-bold">Remove</button>}
                                </div>
                            ) : (
                                <input type="text" value={formData.store.signatureText} onChange={e => updateStore('signatureText', e.target.value)} placeholder="Type your name..." className="w-full px-2 py-1.5 text-sm bg-white border border-gray-200 rounded-md" style={{ fontFamily: "'Dancing Script', cursive" }} />
                            )}
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                            <Input label="Store Name" value={formData.store.name} onChange={e => updateStore('name', e.target.value)} placeholder="e.g. Acme Corp" />
                            <Select label="Business Type" value={formData.store.type} onChange={e => updateStore('type', e.target.value)} options={[
                                { value: 'Retail', label: 'Retail / Shop' }, { value: 'Service', label: 'Services / Agency' }, { value: 'Wholesale', label: 'B2B Wholesale' }, { value: 'Freelance', label: 'Freelance / Consultant' }, { value: 'Restaurant', label: 'Restaurant / Cafe' }, { value: 'Customer', label: 'Customer / Personal' }
                            ]} />
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                            <Input label="GSTIN" value={formData.store.gstin} onChange={e => updateStore('gstin', e.target.value.toUpperCase())} maxLength={15} placeholder="Optional" />
                            <Input label="Address" value={formData.store.address} onChange={e => updateStore('address', e.target.value)} placeholder="City, State" />
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                            <Input label="Phone" value={formData.store.phone} onChange={e => updateStore('phone', e.target.value)} />
                            <Input label="Email" value={formData.store.email} onChange={e => updateStore('email', e.target.value)} type="email" />
                        </div>
                    </SectionCard>

                    {/* Customer Section */}
                    <SectionCard title="Bill To" icon="👤">
                        <div className="grid grid-cols-2 gap-3">
                            <Input label="Customer Name" value={formData.customer.name} onChange={e => updateCust('name', e.target.value)} placeholder="Walk-in Customer" />
                            <Input label="Phone" value={formData.customer.phone} onChange={e => updateCust('phone', e.target.value)} />
                        </div>
                        <Input label="Address" value={formData.customer.address} onChange={e => updateCust('address', e.target.value)} />
                        <div className="grid grid-cols-2 gap-3">
                            <Select label="Payment Mode" value={formData.invoice.payment} onChange={e => updateInv('payment', e.target.value)} options={[
                                { value: 'Cash', label: '💵 Cash' }, { value: 'UPI', label: '📱 UPI' }, { value: 'Card', label: '💳 Card' }, { value: 'Credit', label: '📅 Credit' }
                            ]} />
                            <Select label="Place of Supply" value={formData.invoice.place} onChange={e => updateInv('place', e.target.value)} options={[
                                { value: 'intrastate', label: 'Intra-State (CGST+SGST)' }, { value: 'interstate', label: 'Inter-State (IGST)' }
                            ]} />
                        </div>
                        <div className="mt-3 pt-3 border-t border-gray-100">
                            <h4 className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Adjustments & Style</h4>
                            <div className="grid grid-cols-4 gap-3">
                                <Select label="Template" value={formData.invoice.template} onChange={e => updateInv('template', e.target.value)} options={[
                                    { value: 'Standard', label: 'Standard (A4)' }, { value: 'Minimal', label: 'Minimalist' }, { value: 'Modern', label: 'Modern Purple' }, { value: 'Thermal', label: 'Thermal POS (80mm)' }, { value: 'Customer', label: 'Customer Centric' }
                                ]} />
                                <Select label="Discount Type" value={formData.invoice.discountType} onChange={e => updateInv('discountType', e.target.value)} options={[
                                    { value: 'flat', label: 'Flat (₹)' }, { value: 'percent', label: 'Percent (%)' }
                                ]} />
                                <Input label="Discount" type="number" min="0" value={formData.invoice.discountValue} onChange={e => updateInv('discountValue', e.target.value)} placeholder="0" />
                                <Input label="Amount Paid" type="number" min="0" value={formData.invoice.amountPaid} onChange={e => updateInv('amountPaid', e.target.value)} placeholder="0" />
                            </div>
                        </div>
                    </SectionCard>

                    {/* Add Items Section */}
                    <SectionCard title="Add Items" icon="📦">
                        <div className="grid grid-cols-12 gap-3 mb-2">
                            <div className="col-span-12 sm:col-span-6">
                                <label className="block text-xs font-semibold text-gray-600 mb-1.5">Item / Service Description</label>
                                <input id="item-name-input" list="catalog-list" value={itemForm.name} onChange={handleItemNameChange} onKeyDown={handleBarcodeScan} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm transition-all input-focus" placeholder="Search or type item..." />
                                <datalist id="catalog-list">
                                    {catalog.map((c, i) => <option key={i} value={c.name} />)}
                                </datalist>
                            </div>
                            <div className="col-span-4 sm:col-span-2"><Input label="Code/HSN" value={itemForm.hsn} onChange={e => setItemForm({...itemForm, hsn: e.target.value})} placeholder="0000" /></div>
                            <div className="col-span-4 sm:col-span-2"><Input label="Quantity" type="number" min="1" value={itemForm.qty} onChange={e => setItemForm({...itemForm, qty: Number(e.target.value)})} /></div>
                            <div className="col-span-4 sm:col-span-2">
                                <label className="block text-xs font-semibold text-gray-600 mb-1.5">Unit</label>
                                <select value={itemForm.unit} onChange={e => setItemForm({...itemForm, unit: e.target.value})} className="w-full px-2 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm input-focus">
                                    {['Pcs','Kg','Ltr','Pkt','Box','Nos'].map(u => <option key={u}>{u}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="grid grid-cols-12 gap-3">
                            <div className="col-span-5"><Input label="Rate (₹)" type="number" step="0.01" value={itemForm.rate} onChange={e => setItemForm({...itemForm, rate: Number(e.target.value)})} placeholder="0.00" /></div>
                            <div className="col-span-3">
                                <label className="block text-xs font-semibold text-gray-600 mb-1.5">GST %</label>
                                <select value={itemForm.gst} onChange={e => setItemForm({...itemForm, gst: Number(e.target.value)})} className="w-full px-2 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm input-focus">
                                    {[0, 5, 12, 18, 28].map(r => <option key={r} value={r}>{r}%</option>)}
                                </select>
                            </div>
                            <div className="col-span-4 flex items-end">
                                <button onClick={addItem} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 rounded-lg transition shadow-sm flex items-center justify-center gap-2">
                                    <span>+</span> Add
                                </button>
                            </div>
                        </div>

                        {/* Item List Mini */}
                        {items.length > 0 && (
                            <div className="mt-4 border-t pt-3">
                                <p className="text-xs font-bold text-gray-400 uppercase mb-2">Added Items ({items.length})</p>
                                <div className="space-y-2 max-h-32 overflow-y-auto custom-scroll pr-1">
                                    {items.map(i => (
                                        <div key={i.id} className="flex items-center justify-between bg-gray-50 p-2 rounded-lg text-xs border border-gray-100">
                                            <div className="flex-1 min-w-0">
                                                <p className="font-medium text-gray-800 truncate">{i.name}</p>
                                                <p className="text-gray-400">{i.qty} {i.unit} @ ₹{i.rate}</p>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <span className="font-bold text-emerald-600">₹{i.total.toFixed(2)}</span>
                                                <button onClick={() => removeItem(i.id)} className="text-red-400 hover:text-red-600 font-bold px-1">×</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </SectionCard>

                    {/* Data Options */}
                    <SectionCard title="Data Backup" icon="💾">
                        <div className="grid grid-cols-2 gap-3 mb-3">
                            <button onClick={() => document.getElementById('csv-upload').click()} className="bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded-lg text-sm font-bold transition flex items-center justify-center gap-2">
                                📥 Import CSV
                            </button>
                            <input type="file" id="csv-upload" accept=".csv" className="hidden" onChange={onImportCSV} />
                            
                            <button onClick={onExportCSV} className="bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded-lg text-sm font-bold transition flex items-center justify-center gap-2">
                                📤 Export CSV
                            </button>
                        </div>
                        <a href="./sample_items.csv" download className="text-xs text-blue-600 hover:text-blue-800 underline block text-center">
                            Download Sample CSV format
                        </a>
                    </SectionCard>

                    {/* Action Buttons */}
                    <div className="grid grid-cols-2 gap-3 pb-6">
                        <button onClick={onDownload} className="bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold shadow-md transition flex items-center justify-center gap-2">
                            <span>📥</span> Save PDF
                        </button>
                        <button onClick={onWhatsApp} className="bg-green-500 hover:bg-green-600 text-white py-3 rounded-xl font-bold shadow-md transition flex items-center justify-center gap-2">
                            <span>📱</span> WhatsApp
                        </button>
                        <button onClick={onReset} className="col-span-2 bg-white hover:bg-gray-50 text-gray-600 border border-gray-200 py-3 rounded-xl font-bold shadow-sm transition">
                            🔄 Reset Invoice
                        </button>
                    </div>
                </div>
            );
        };

        // ──────────── RIGHT PANEL: INVOICE PREVIEW ────────────
        const InvoicePreview = ({ formData, items, totals, amountWords }) => {
            const formatDate = (d) => d ? new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) : '-';
            const isInter = formData.invoice.place === 'interstate';
            const tpl = formData.invoice.template;
            const type = formData.store.type;
            const isService = ['Service', 'Freelance'].includes(type);

            if (tpl === 'Thermal') {
                return (
                    <div className="print-container sticky top-6 flex justify-center">

                    {/* Login Modal */}
                    {isLoginModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden border border-gray-200 relative animate-in fade-in zoom-in duration-300">
                                <div className="p-8">
                                    <div className="text-center mb-8">
                                        <div className="w-14 h-14 bg-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                            <span className="text-2xl font-black text-white">O</span>
                                        </div>
                                        <h2 className="text-xl font-black text-gray-900 tracking-tight">Enterprise Access</h2>
                                        <p className="text-gray-500 text-sm mt-1">{authForm.isSignup ? 'Register your workspace' : 'Sign in to sync your ledger'}</p>
                                    </div>
                                    
                                    <form onSubmit={handleAuth} className="space-y-4">
                                        <div>
                                            <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1.5 ml-1">Email Address</label>
                                            <input type="email" required value={authForm.email} onChange={e => setAuthForm({...authForm, email: e.target.value})} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-emerald-500 transition-all" placeholder="admin@company.com" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1.5 ml-1">Password</label>
                                            <input type="password" required value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-emerald-500 transition-all" placeholder="••••••••" />
                                        </div>
                                        <button type="submit" className="w-full py-4 bg-gray-900 text-white rounded-xl font-bold text-sm shadow-xl hover:bg-black mt-2 active:scale-95 transition-all">
                                            {authForm.isSignup ? 'Create Workspace' : 'Launch Session'}
                                        </button>
                                    </form>
                                    
                                    <div className="mt-8 pt-6 border-t border-gray-100 text-center">
                                        <button onClick={() => setAuthForm({...authForm, isSignup: !authForm.isSignup})} className="text-xs font-bold text-emerald-600 hover:text-emerald-700">
                                            {authForm.isSignup ? 'Already have an account? Login' : "New here? Create your workspace"}
                                        </button>
                                    </div>
                                    <button onClick={() => setIsLoginModal(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl font-light">×</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
